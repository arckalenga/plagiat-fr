<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiat-FR - Connexion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
            max-width: 90%;
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Plagiat-FR</h1>
        
        <div id="message" class="message"></div>
        
        <h3>🔐 Connexion / Inscription</h3>
        
        <input type="email" id="email" placeholder="Email" value="arcelkaleng@gmail.com">
        <input type="password" id="password" placeholder="Mot de passe (6 caractères)">
        <input type="text" id="fullname" placeholder="Nom complet (optionnel)">
        
        <button id="btnInscription">📝 S'inscrire</button>
        <button id="btnConnexion">🔑 Se connecter</button>
        
        <p style="font-size: 12px; color: #666; text-align: center; margin-top: 20px;">
            ℹ️ Les comptes doivent être approuvés par un administrateur
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://cscdrjnixkebjfgfyzqx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_KPdgb_bqmQjYFsIgil5Flg_uWj8IUDO';
        
        // Initialisation
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function afficherMessage(texte, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texte;
            msgDiv.className = 'message ' + type;
            msgDiv.style.display = 'block';
            setTimeout(function() { 
                msgDiv.style.display = 'none'; 
            }, 5000);
        }
        
        // Fonction inscription
        async function inscription() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;
            
            if (!email || !password) {
                afficherMessage('Veuillez remplir email et mot de passe', 'error');
                return;
            }
            
            if (password.length < 6) {
                afficherMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
                return;
            }
            
            afficherMessage('Inscription en cours...', 'info');
            
            try {
                // Création du compte
                const resultat = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (resultat.error) throw resultat.error;
                
                // Création du profil
                if (resultat.data.user) {
                    await supabase.from('profiles').insert({
                        id: resultat.data.user.id,
                        email: email,
                        full_name: fullname,
                        is_admin: false,
                        is_approved: false
                    });
                }
                
                afficherMessage('Inscription réussie ! En attente d\'approbation.', 'success');
                
            } catch (erreur) {
                afficherMessage('Erreur: ' + erreur.message, 'error');
                console.error(erreur);
            }
        }
        
        // Fonction connexion
        async function connexion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                afficherMessage('Veuillez remplir email et mot de passe', 'error');
                return;
            }
            
            afficherMessage('Connexion en cours...', 'info');
            
            try {
                const resultat = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (resultat.error) throw resultat.error;
                
                afficherMessage('Connexion réussie !', 'success');
                
                // Afficher les infos utilisateur
                console.log('Connecté:', resultat.data.user.email);
                
            } catch (erreur) {
                afficherMessage('Erreur: ' + erreur.message, 'error');
                console.error(erreur);
            }
        }
        
        // Attacher les événements aux boutons
        document.getElementById('btnInscription').addEventListener('click', inscription);
        document.getElementById('btnConnexion').addEventListener('click', connexion);
        
        console.log('Page chargée - Prêt');
    </script>
</body>
</html>
